name: jdiamonds

services:
  postgres-dev:
    image: postgres:16-alpine
    container_name: jdiamonds-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: jdiamonds
      POSTGRES_PASSWORD: jdiamonds
      POSTGRES_DB: jdiamonds_dev
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - jdiamonds_postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdiamonds -d jdiamonds_dev"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-test:
    image: postgres:16-alpine
    container_name: jdiamonds-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: jdiamonds
      POSTGRES_PASSWORD: jdiamonds
      POSTGRES_DB: jdiamonds_test
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - jdiamonds_postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jdiamonds -d jdiamonds_test"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  jdiamonds_postgres_dev_data:
  jdiamonds_postgres_test_data: