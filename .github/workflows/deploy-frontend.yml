name: Deploy frontend to GitHub Pages

on:
  workflow_dispatch:

  push:
    branches:
      - main

    paths:
      - "frontend/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-frontend.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      NUXT_PUBLIC_APP_ENVIRONMENT: production
      NUXT_PUBLIC_API_BASE_URL: ${{ vars.NUXT_PUBLIC_API_BASE_URL }}
      NUXT_PUBLIC_SITE_URL: https://jodiamonds.store

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable Corepack
        run: corepack enable

      - name: Validate deployment configuration
        shell: bash
        run: |
          if [ -z "$NUXT_PUBLIC_API_BASE_URL" ]; then
            echo "NUXT_PUBLIC_API_BASE_URL repository variable is missing."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Type-check frontend
        run: pnpm --filter frontend typecheck

      - name: Build Nuxt frontend
        run: pnpm --filter frontend exec nuxt build --preset github_pages

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: frontend/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
